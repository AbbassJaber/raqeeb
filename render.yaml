# Render Blueprint — deploys the Raqeeb watchroom as a Docker web service in LIVE mode
# (real Sentinel-2 via Earth Engine + Claude vision/tool-use).
#
# One-time setup in the Render dashboard after you connect this repo as a Blueprint:
#   1. Set ANTHROPIC_API_KEY (it's marked sync:false below, so Render prompts for it as a secret).
#   2. Add a Secret File named `earthengine-credentials` whose contents are your local
#      ~/.config/earthengine/credentials  (created by `earthengine authenticate`).
#      The image entrypoint (docker-entrypoint.sh) copies it into the place earthengine-api
#      expects, so no code change is needed. If you skip this, the app still runs — cached
#      real cases and the Claude chat/agent work; only NEW drawn-zone fetches need Earth Engine.
#
# Render maps these env vars into Docker build args, so INSTALL_LIVE=1 builds the image with
# earthengine-api (for live Sentinel-2). The `anthropic` SDK is already in requirements.txt,
# so Claude itself needs no build flag.
services:
  - type: web
    name: raqeeb
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free                 # free tier sleeps when idle; bump to a paid plan for the live stage demo
    region: frankfurt          # closest Render region to Lebanon (lower latency)
    healthCheckPath: /api/health
    autoDeploy: true           # redeploy on every push to the connected branch
    # No dockerCommand: the image's CMD (docker-entrypoint.sh) binds Render's $PORT and
    # places the Earth Engine creds Secret File if present.
    envVars:
      - key: INSTALL_LIVE          # build-time: install earthengine-api (live Sentinel-2) into the image
        value: "1"
      - key: RAQEEB_OFFLINE
        value: "0"
      - key: RAQEEB_LLM
        value: claude
      - key: EARTHENGINE_PROJECT   # your GCP project (from the demo runsheet); change if different
        value: raqeeb-498718
      - key: ANTHROPIC_API_KEY     # secret — Render prompts for this in the dashboard
        sync: false
      # Optional: override the model (defaults to claude-sonnet-4-6 in raqeeb/config.py).
      # - key: RAQEEB_MODEL
      #   value: claude-sonnet-4-6
