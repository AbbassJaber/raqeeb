# Render Blueprint — deploys the Raqeeb watchroom as a Docker web service in LIVE mode
# (real Sentinel-2 via Earth Engine + Gemini vision).
#
# One-time setup in the Render dashboard after you connect this repo as a Blueprint:
#   1. Set GEMINI_API_KEY (it's marked sync:false below, so Render prompts for it as a secret).
#   2. Add a Secret File named `earthengine-credentials` whose contents are your local
#      ~/.config/earthengine/credentials  (created by `earthengine authenticate`).
#      The start command below copies it into the place the earthengine-api expects, so no
#      code change is needed. If you skip this, the app still runs — cached real cases and
#      the Gemini chat/agent work; only NEW drawn-zone Sentinel-2 fetches need Earth Engine.
#
# Render maps these env vars into Docker build args, so INSTALL_LIVE=1 makes the image
# build with google-genai + earthengine-api (see the Dockerfile's INSTALL_LIVE arg).
services:
  - type: web
    name: raqeeb
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free                 # free tier sleeps when idle; bump to a paid plan for the live stage demo
    region: frankfurt          # closest Render region to Lebanon (lower latency)
    healthCheckPath: /api/health
    autoDeploy: true           # redeploy on every push to the connected branch
    # Place Earth Engine creds (if the Secret File is present), then serve on Render's $PORT.
    dockerCommand: >-
      sh -c 'if [ -f /etc/secrets/earthengine-credentials ]; then
      mkdir -p /root/.config/earthengine &&
      cp /etc/secrets/earthengine-credentials /root/.config/earthengine/credentials; fi;
      exec uvicorn app.server:app --host 0.0.0.0 --port ${PORT:-8000}'
    envVars:
      - key: INSTALL_LIVE          # build-time: install the live deps into the image
        value: "1"
      - key: RAQEEB_OFFLINE
        value: "0"
      - key: RAQEEB_LLM
        value: gemini
      - key: EARTHENGINE_PROJECT   # your GCP project (from the demo runsheet); change if different
        value: raqeeb-498718
      - key: GEMINI_API_KEY        # secret — Render prompts for this in the dashboard
        sync: false
